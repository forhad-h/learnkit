<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="../../core/css/styles.css" />
    <style>
      body {
        padding-top: 0;
      }
      .dash-layout {
        max-width: 860px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      .dash-top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .dash-top-bar h2 {
        font-size: 13px;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      #continueBanner {
        display: none;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="dash-layout">
      <!-- Header card — populated by initDashboard() from config.js -->
      <div id="dashHeader"></div>

      <!-- Overall progress + backup warning -->

      <div class="progress-card">
        <div class="progress-main">
          <span class="progress-label">Overall progress</span>
          <div class="progress-track">
            <div class="progress-fill" id="dashProgressFill"></div>
          </div>
          <span class="progress-count" id="dashProgressCount">0 / ?</span>
        </div>
        <div class="progress-backup-row">
          <svg class="progress-backup-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span class="progress-backup-text">Progress stays in this browser only — switching browsers or clearing data will reset it.</span>
          <a href="pages/settings.html" class="btn-icon-labeled" title="Export / Import" style="flex-shrink:0;">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            Export / Import
          </a>
        </div>
      </div>

      <!-- Continue banner — populated by initDashboard() -->
      <div id="continueBanner"></div>

      <!-- Module list heading -->
      <div class="dash-top-bar">
        <h2>All modules</h2>
      </div>

      <!-- Module cards — populated by initDashboard() -->
      <div class="module-list" id="moduleList"></div>

      <!-- Footer — populated by initDashboard() -->
      <div class="page-footer" id="dashFooter"></div>
    </div>

    <script src="./config.js"></script>
    <script src="../../core/js/framework.js"></script>
    <script>
      initDashboard()
    </script>
  </body>
</html>
