<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>
<link rel="stylesheet" href="../../core/css/styles.css">
<style>
  body { padding-top: 0; }
  .dash-layout { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  .dash-top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .dash-top-bar h2 { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  #continueBanner { display: none; margin-bottom: 20px; }
  .progress-card { flex-wrap: wrap; }
  .progress-backup-row {
    width: 100%; display: flex; align-items: center; gap: 10px;
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--amber-border);
    background: var(--amber-bg); margin-left: -24px; margin-right: -24px;
    padding-left: 24px; padding-right: 18px; margin-bottom: -18px;
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .progress-backup-icon { color: var(--amber); flex-shrink: 0; }
  .progress-backup-text { flex: 1; font-size: 12px; color: #92400e; line-height: 1.5; }
  [data-theme="dark"] .progress-backup-text { color: #fde68a; }
</style>
</head>
<body>

<div class="dash-layout">

  <!-- Header card — populated by initDashboard() from config.js -->
  <div id="dashHeader"></div>

  <!-- Overall progress + backup warning -->
  <div class="progress-card">
    <span class="progress-label">Overall progress</span>
    <div class="progress-track"><div class="progress-fill" id="dashProgressFill"></div></div>
    <span class="progress-count" id="dashProgressCount">0 / ?</span>
    <div class="progress-backup-row">
      <svg class="progress-backup-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span class="progress-backup-text">Progress stays in this browser only — switching browsers or clearing data will reset it.</span>
      <a href="pages/settings.html" class="btn" style="font-size:12px;padding:4px 10px;flex-shrink:0;">Export / Import</a>
    </div>
  </div>

  <!-- Continue banner — populated by initDashboard() -->
  <div id="continueBanner"></div>

  <!-- Section list heading -->
  <div class="dash-top-bar">
    <h2>All sections</h2>
  </div>

  <!-- Section cards — populated by initDashboard() -->
  <div class="section-list" id="sectionList"></div>

  <!-- Footer — populated by initDashboard() -->
  <div class="page-footer" id="dashFooter"></div>

</div>

<script src="./config.js"></script>
<script src="../../core/js/framework.js"></script>
<script>initDashboard();</script>
</body>
</html>
