<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineering — Prompts · RAG · Agents</title>
<link rel="stylesheet" href="../../core/css/styles.css">
<style>
  body { padding-top: 0; }
  .dash-layout { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  .dash-top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .dash-top-bar h2 { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
  #continueBanner { display: none; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="dash-layout">

  <div id="dashHeader"></div>

  <div class="progress-card">
    <div class="progress-main">
      <span class="progress-label">Overall progress</span>
      <div class="progress-track"><div class="progress-fill" id="dashProgressFill"></div></div>
      <span class="progress-count" id="dashProgressCount">0 / ?</span>
    </div>
    <div class="progress-backup-row">
      <svg class="progress-backup-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span class="progress-backup-text">Progress stays in this browser only — switching browsers or clearing data will reset it.</span>
      <a href="pages/settings.html" class="btn-icon" title="Settings" style="flex-shrink:0;">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
    </div>
  </div>

  <div id="continueBanner"></div>

  <div class="dash-top-bar">
    <h2>All sections</h2>
  </div>

  <div class="section-list" id="sectionList"></div>

  <div class="page-footer" id="dashFooter"></div>

</div>

<script src="./config.js"></script>
<script src="../../core/js/framework.js"></script>
<script>initDashboard();</script>
</body>
</html>
