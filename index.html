<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnKit — All Courses</title>
  <link rel="stylesheet" href="./core/css/styles.css" />
  <style>
    body {
      padding-top: 0;
    }

    /* ── Home layout ── */
    .home-layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── Brand header ── */
    .home-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .home-brand-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .home-brand h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .home-brand p {
      font-size: 13.5px;
      color: var(--text3);
      margin-top: 2px;
    }

    .home-module-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin: 36px 0 12px;
    }

    /* ── Course card grid ── */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 14px;
    }

    .course-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      padding: 22px 24px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .course-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg), var(--shadow-md);
      transform: translateY(-2px);
    }

    .course-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .course-icon {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      background: var(--bg2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .course-card-info {
      flex: 1;
      min-width: 0;
    }
    .course-card-title {
      font-size: 15.5px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .course-card-subtitle {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.5;
    }

    .course-card-desc {
      font-size: 13.5px;
      color: var(--text2);
      line-height: 1.6;
    }

    .course-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .course-meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text3);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
      white-space: nowrap;
    }
    .course-meta-pill svg {
      flex-shrink: 0;
    }

    /* ── Progress strip inside card ── */
    .course-progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .course-progress-track {
      flex: 1;
      height: 5px;
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
    }
    .course-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #14b8a6);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .course-progress-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text3);
      white-space: nowrap;
      min-width: 36px;
      text-align: right;
    }

    .course-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      align-self: flex-start;
    }
    .course-cta svg {
      transition: transform 0.15s;
    }
    .course-card:hover .course-cta svg {
      transform: translateX(3px);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text3);
    }
    .empty-state p {
      font-size: 14px;
      margin-top: 8px;
    }

    /* ── Footer ── */
    .home-footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .home-footer-text {
      font-size: 12px;
      color: var(--text3);
    }
    .home-footer-link {
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
    }
    .home-footer-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 560px) {
      .course-grid {
        grid-template-columns: 1fr;
      }
      .home-brand h1 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="home-layout">

    <div class="home-brand">
      <div class="home-brand-icon">📚</div>
      <div>
        <h1>LearnKit</h1>
        <p>Structured, hands-on courses — track your progress as you learn.</p>
      </div>
    </div>

    <p class="home-module-label">Available courses</p>

    <div class="course-grid" id="courseGrid"></div>

    <div class="home-footer">
      <span class="home-footer-text">LearnKit · open-source course framework</span>
      <a class="home-footer-link" href="https://github.com/ForhadHossainKhan/LearnKit" target="_blank" rel="noopener">View on GitHub →</a>
    </div>

  </div>

  <script>
    const COURSES = [
      {
        title: 'C++ for Drone Engineering',
        icon: '🚁',
        subtitle: 'Ubuntu 24.04 · ROS2 Jazzy · ArduPilot SITL · C++17',
        description: 'From zero to job-ready portfolio. Write real ROS2 drone software in C++ with a GitHub portfolio to show for it.',
        href: './courses/cpp-drone/index.html',
        stateKey: 'drone_course_state',
        moduleCount: 11,
        timeCommitment: '8–9 hrs/week · ~3 months',
      },
      {
        title: 'AI Engineering with Claude',
        icon: '🤖',
        subtitle: 'Claude API · Tool Use · Agent Loops · Real Projects',
        description: 'A fast, practical course — build and ship working AI agents with Claude Code that solve real problems by day 5.',
        href: './courses/ai-engineering/index.html',
        stateKey: 'ai_engineering_state',
        moduleCount: 7,
        timeCommitment: '2–3 hrs/day · 3–5 days',
      },
    ];

    function getProgress(stateKey, moduleCount) {
      try {
        const raw = localStorage.getItem(stateKey);
        if (!raw) return { completed: 0, total: moduleCount, started: false };
        const state = JSON.parse(raw);
        const modules = state.modules || {};
        const completed = Object.values(modules).filter(v => v === 'completed').length;
        const inProgress = Object.values(modules).filter(v => v === 'in-progress').length;
        return {
          completed,
          total: moduleCount,
          started: completed > 0 || inProgress > 0,
        };
      } catch {
        return { completed: 0, total: moduleCount, started: false };
      }
    }

    function renderCards() {
      const grid = document.getElementById('courseGrid');

      if (COURSES.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div style="font-size:32px">🔭</div>
            <p>No courses yet. Open Claude Code and ask it to create a course.</p>
          </div>`;
        return;
      }

      COURSES.forEach(t => {
        const prog = getProgress(t.stateKey, t.moduleCount);
        const pct = prog.total > 0 ? Math.round((prog.completed / prog.total) * 100) : 0;
        const ctaLabel = prog.completed === prog.total && prog.total > 0
          ? 'Review'
          : prog.started ? 'Continue' : 'Start learning';

        const card = document.createElement('a');
        card.className = 'course-card';
        card.href = t.href;
        card.innerHTML = `
          <div class="course-card-top">
            <div class="course-icon">${t.icon}</div>
            <div class="course-card-info">
              <div class="course-card-title">${t.title}</div>
              <div class="course-card-subtitle">${t.subtitle}</div>
            </div>
          </div>
          <div class="course-card-desc">${t.description}</div>
          <div class="course-card-meta">
            <span class="course-meta-pill">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
              ${t.moduleCount} modules
            </span>
            <span class="course-meta-pill">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${t.timeCommitment}
            </span>
          </div>
          <div class="course-progress">
            <div class="course-progress-track">
              <div class="course-progress-fill" style="width:${pct}%"></div>
            </div>
            <span class="course-progress-label">${pct}%</span>
          </div>
          <span class="course-cta">
            ${ctaLabel}
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        `;
        grid.appendChild(card);
      });
    }

    renderCards();
  </script>
</body>
</html>
